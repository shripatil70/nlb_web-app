<!DOCTYPE html>
<html>
<head>
    <title>Scalable NLB App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: #0f172a;
            color: white;
        }
        h1 {
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <h1>🚀 Scalable Web App</h1>
    <p>Deployed using AWS NLB + Auto Scaling</p>
    <p id="instance"></p>

    <script>
        fetch("http://169.254.169.254/latest/meta-data/instance-id")
        .then(res => res.text())
        .then(data => {
            document.getElementById("instance").innerHTML = "Instance ID: " + data;
        });
    </script>
</body>
</html>
